name: Release on new modVersion

# Publishes a GitHub release whenever About/About.xml is pushed with a modVersion
# that has no matching release yet. The zip mirrors the Steam download: every
# top-level entry except dot-prefixed ones, Source/, docs/, _PublisherPlus.xml,
# and any .sln / .psd / .code-workspace file.
#
# When About/PublishedFileId.txt exists and both STEAM_USERNAME and
# STEAM_CONFIG_VDF secrets are set, the same staged files are also pushed to the
# Steam Workshop item. Absent either, the Steam step silently no-ops.

on:
  push:
    branches: [main]
    paths:
      - About/About.xml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read mod metadata
        id: meta
        run: |
          set -euo pipefail
          version=$(sed -n 's:.*<modVersion>\(.*\)</modVersion>.*:\1:p' About/About.xml | head -n1 | tr -d '[:space:]')
          name=$(sed -n 's:.*<name>\(.*\)</name>.*:\1:p' About/About.xml | head -n1 | sed 's/^ *//;s/ *$//')
          if [ -z "$version" ]; then
            echo "::error file=About/About.xml::No <modVersion> found"
            exit 1
          fi
          name=${name:-mod}
          slug=$(echo "$name" | tr -cd '[:alnum:]')
          if [ -f About/PublishedFileId.txt ]; then
            workshopId=$(tr -d '[:space:]' < About/PublishedFileId.txt)
          else
            workshopId=
          fi
          {
            echo "version=$version"
            echo "tag=v$version"
            echo "name=$name"
            echo "zip=${slug}-${version}.zip"
            echo "workshopId=$workshopId"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.meta.outputs.tag }} already exists - nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package mod
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          # Stage into a workspace dot-dir (skipped by the `*` glob below, and so
          # a workspace-relative path the Steam Workshop action can read).
          staging="$GITHUB_WORKSPACE/.staging/${{ steps.meta.outputs.name }}"
          mkdir -p "$staging"
          # Mirror the Steam download: every top-level entry except dot-prefixed
          # ones (the glob skips them), Source/, docs/, and _PublisherPlus.xml.
          for entry in *; do
            case "${entry,,}" in
              source|docs|_publisherplus.xml) continue ;;
            esac
            cp -r "$entry" "$staging/"
          done
          find "$staging" -type f \( -iname '*.psd' -o -iname '*.sln' -o -iname '*.code-workspace' \) -delete
          ( cd "$GITHUB_WORKSPACE/.staging" && zip -rX "$RUNNER_TEMP/${{ steps.meta.outputs.zip }}" "${{ steps.meta.outputs.name }}" )
          echo "Packaged contents:"
          ( cd "$GITHUB_WORKSPACE/.staging" && find "${{ steps.meta.outputs.name }}" -maxdepth 2 -print )

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" \
            "$RUNNER_TEMP/${{ steps.meta.outputs.zip }}" \
            --title "${{ steps.meta.outputs.name }} ${{ steps.meta.outputs.version }}" \
            --target "${{ github.sha }}" \
            --generate-notes

      - name: Deploy to Steam Workshop
        if: >-
          steps.check.outputs.exists == 'false' &&
          steps.meta.outputs.workshopId != '' &&
          env.STEAM_USERNAME != '' &&
          env.STEAM_CONFIG_VDF != ''
        uses: Skyl3lazer/SteamWorkshopDeploy@latest
        with:
          appId: 294100
          publishedFileId: ${{ steps.meta.outputs.workshopId }}
          path: .staging/${{ steps.meta.outputs.name }}
          username: ${{ env.STEAM_USERNAME }}
          configVdf: ${{ env.STEAM_CONFIG_VDF }}
          changeNote: Version ${{ steps.meta.outputs.version }}
